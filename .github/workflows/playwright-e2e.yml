name: Playwright Chatbot E2E

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  frontend-chatbot-e2e:
    name: Frontend chatbot Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: eMas Front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eMas Front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        run: npm test

      - name: Run chatbot Playwright E2E
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: eMas Front/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: eMas Front/test-results/
          if-no-files-found: ignore
          retention-days: 7
